name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Unit tests
        run: npm test
      - name: Validate registries
        run: node src/cli.js validate
      - name: Smoke test (full pipeline)
        run: npm run smoke
